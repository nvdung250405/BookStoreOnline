<div class="p-4 p-md-5 w-100">
    <main class="flex-grow-1 p-4 p-md-5">
        <div class="mb-5">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-2">
                    <li class="breadcrumb-item small"><a href="javascript:void(0)" onclick="layout.render('Dashboard/Admin', 'Index')" class="text-decoration-none text-muted">Admin Hub</a></li>
                    <li class="breadcrumb-item small"><a href="javascript:void(0)" onclick="layout.render('Authors/Admin', 'Index')" class="text-decoration-none text-muted">Authors</a></li>
                    <li class="breadcrumb-item small active fw-bold text-accent">New Author</li>
                </ol>
            </nav>
            <h2 class="fw-bold font-serif mb-0">Create New Author</h2>
        </div>

        <div class="row">
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5 bg-white">
                    <div class="mb-4">
                        <label class="form-label fw-bold small text-muted text-uppercase">Author Name <span class="text-danger">*</span></label>
                        <input type="text" id="author-name" class="form-control rounded-pill px-4 border-light bg-light py-2" placeholder="e.g. Victor Hugo">
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold small text-muted text-uppercase">Biography</label>
                        <textarea id="author-bio" class="form-control rounded-4 px-4 border-light bg-light py-3" rows="6" placeholder="Short biography of the author..."></textarea>
                    </div>

                    <div class="d-flex gap-3 justify-content-end mt-4">
                        <button onclick="layout.render('Authors/Admin', 'Index')" class="btn btn-light rounded-pill px-4 fw-bold">Cancel</button>
                        <button onclick="authors.create()" class="btn btn-accent rounded-pill px-5 fw-bold shadow-sm">Save Author</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
