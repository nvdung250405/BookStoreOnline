<body>
    <div id="header-area"></div>

    <div class="d-flex w-100">
        <!-- Sidebar cố định cho Admin (Chỉ hiện khi vào trang Admin) -->
        <div id="admin-sidebar-global" style="display: none;"></div>

        <!-- Vùng nạp nội dung chính -->
        <main id="render-body" class="flex-grow-1 p-0"></main>
    </div>

    <!-- AI Chat Support Widget (Person 5) -->
    <div id="chat-widget-container" style="position: fixed; bottom: 30px; right: 30px; z-index: 1050;">
        <button onclick="support.toggleChat()"
            class="btn btn-accent rounded-circle shadow-lg p-0 d-flex align-items-center justify-content-center"
            style="width: 60px; height: 60px; border: none;">
            <i class="icon icon-paper-plane fs-4 text-white"></i>
        </button>
        <div id="chat-box-holder" style="display: none; position: absolute; bottom: 75px; right: 0; width: 350px;">
            <!-- Content will be loaded dynamically -->
        </div>
    </div>

    <!-- Global System Alert (Forced Visibility Version) -->
    <div class="position-fixed bottom-0 end-0 p-4" style="z-index: 99999;">
        <div id="systemAlert" class="shadow-lg rounded-4 overflow-hidden border" 
             style="display: none; width: 350px; background: #ffffff; border: 2px solid #C5A992 !important;">
            <div class="d-flex align-items-center p-3">
                <div id="alertIconWrap" class="rounded-circle d-flex align-items-center justify-content-center me-3" 
                     style="width: 40px; height: 40px; background: #f5f0eb;">
                    <span id="alertIcon" style="font-weight: bold; color: #C5A992;">?</span>
                </div>
                <div class="flex-grow-1">
                    <div id="alertTitle" class="fw-bold mb-0" style="font-size: 0.9rem; color: #212529;">Thông báo</div>
                    <div id="alertMessage" class="text-secondary" style="font-size: 0.85rem;"></div>
                </div>
                <button type="button" class="btn-close ms-2 shadow-none" style="font-size: 0.6rem;" 
                        onclick="api.hideToast()"></button>
            </div>
            <div id="alertProgress" style="height: 4px; background: #C5A992; width: 100%;"></div>
        </div>
    </div>

    <!-- Global System Confirm Modal (Premium Popup) -->
    <div id="systemConfirmModal" class="position-fixed top-0 start-0 w-100 h-100 align-items-center justify-content-center" 
         style="display: none; z-index: 100000; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);">
        <div class="bg-white rounded-5 shadow-lg p-5 text-center" style="width: 420px; border: 1px solid #eee;">
            <div class="mb-4 d-flex justify-content-center">
                <div class="rounded-circle d-flex align-items-center justify-content-center" 
                     style="width: 80px; height: 80px; background: #fff5f5; border: 2px solid #fee2e2;">
                    <span style="font-size: 2.5rem; color: #dc2626;">⚠</span>
                </div>
            </div>
            <h4 id="confirmTitle" class="fw-bold mb-3" style="color: #1a1a1a;">Xác nhận xóa?</h4>
            <p id="confirmMessage" class="text-muted mb-5 px-3" style="font-size: 0.95rem; line-height: 1.6;">
                Hành động này không thể hoàn tác. Bạn có chắc chắn muốn xóa không?
            </p>
            <div class="d-flex gap-2 justify-content-center">
                <button id="btn-confirm-cancel" class="btn btn-light rounded-pill px-4 fw-bold text-muted border" style="min-width: 120px;">Hủy bỏ</button>
                <button id="btn-confirm-proceed" class="btn btn-danger rounded-pill px-4 fw-bold shadow-sm" style="min-width: 120px; background: #dc2626;">Đồng ý</button>
            </div>
        </div>
    </div>

    <!-- Profile Update Reminder Modal -->
    <div class="modal fade" id="update-profile-reminder-modal" tabindex="-1" aria-hidden="true" style="z-index: 9999;">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="modal-header border-0 bg-accent text-white py-3">
                    <h5 class="modal-title fw-bold">🔔 Nhắc nhở cập nhật thông tin</h5>
                    <button type="button" class="btn-close btn-close-white shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4 text-center">
                    <div class="mb-3">
                        <i class="icon icon-ns-user text-accent animate-bounce" style="font-size: 3.5rem;"></i>
                    </div>
                    <h5 class="fw-bold mb-3">Thông tin hồ sơ chưa đầy đủ</h5>
                    <p class="text-muted px-3" id="update-reminder-reason">
                        Bạn chưa cập nhật đầy đủ thông tin cá nhân. Hãy hoàn thiện hồ sơ để trải nghiệm dịch vụ tốt hơn.
                    </p>
                </div>
                <div class="modal-footer border-0 p-4 pt-0">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Để sau</button>
                    <button type="button" class="btn btn-accent rounded-pill px-4 fw-bold shadow-sm" 
                            onclick="bootstrap.Modal.getOrCreateInstance(document.getElementById('update-profile-reminder-modal')).hide(); layout.render('Users', 'Profile');">
                        Cập nhật ngay
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/modules/vouchers.js"></script>

    <script>
        $(document).ready(() => {
            // Hệ thống điều phối (Router) dựa trên Hash (#/)
            function handleRoute() {
                const hash = window.location.hash;
                console.log("Navigating to hash:", hash);
                
                if (!hash || hash === '#/' || hash === '#') {
                    layout.render('', 'Home/Index');
                    return;
                }

                // Cấu trúc mong đợi: #/Area/View/Id hoặc #/View/Id
                const parts = hash.substring(2).split('/');
                if (parts.length >= 2) {
                    const area = parts[0];
                    const view = parts[1];
                    const id = parts[2] || null;
                    layout.render(area, view, id);
                } else if (parts.length === 1) {
                    layout.render('', parts[0]);
                } else {
                    layout.render('', 'Home/Index');
                }
            }

            // Lắng nghe thay đổi URL
            window.addEventListener('hashchange', handleRoute);
            
            // Chạy lần đầu khi vừa load trang
            handleRoute();
            // Restore last view or default to Home
            const lastArea = sessionStorage.getItem('last_area');
            const lastView = sessionStorage.getItem('last_view');
            const lastId   = sessionStorage.getItem('last_id');

            if (lastView) {
                console.log(`Restoring View: ${lastArea}/${lastView}`);
                layout.render(lastArea, lastView, lastId);
            } else {
                layout.render('', 'Home/Index');
            }
        });
    </script>
