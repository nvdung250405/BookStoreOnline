<!-- Login View -->
<section id="login-form-section" class="py-5">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="card-header bg-accent text-white py-4 text-center border-0">
                        <h2 class="h3 mb-0 fw-bold">Đăng nhập tài khoản</h2>
                    </div>
                    <div class="card-body p-5">
                        <form id="loginForm" class="row gy-4">
                            <div class="col-12">
                                <label for="username" class="form-label fw-bold">Tên đăng nhập / Email</label>
                                <input type="text" id="username" name="username" class="form-control form-control-lg border-light bg-light" placeholder="Nhập tên đăng nhập" required>
                            </div>
                            <div class="col-12">
                                <label for="password" class="form-label fw-bold">Mật khẩu</label>
                                <input type="password" id="password" name="password" class="form-control form-control-lg border-light bg-light" placeholder="Nhập mật khẩu" required>
                            </div>
                            <div class="col-12 d-flex justify-content-between align-items-center mb-2">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="rememberMe">
                                    <label class="form-check-label small" for="rememberMe">Ghi nhớ tôi</label>
                                </div>
                                <a href="#" class="text-accent small text-decoration-none fw-bold">Quên mật khẩu?</a>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-accent btn-lg w-100 py-3 fw-bold shadow-sm">
                                    Đăng nhập ngay <i class="icon icon-ns-arrow-right ms-2"></i>
                                </button>
                            </div>
                            <div class="col-12 text-center mt-4">
                                <p class="text-muted small mb-0">Chưa có tài khoản? <a href="javascript:void(0)" onclick="layout.render('Auth', 'Register')" class="text-accent fw-bold text-decoration-none">Đăng ký ngay</a></p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<style>
    .bg-accent { background-color: var(--accent-color); }
    .text-accent { color: var(--accent-color); }
    .btn-accent { background-color: var(--accent-color); color: white; border: none; }
    .btn-accent:hover { background-color: var(--dark-color); }
    .form-control:focus { border-color: var(--accent-color); box-shadow: 0 0 0 0.25rem rgba(197, 169, 146, 0.25); }
</style>
