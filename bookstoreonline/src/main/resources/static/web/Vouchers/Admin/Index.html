<div class="p-4 p-md-5 w-100">
    <main class="flex-grow-1 p-4 p-md-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-2">
                        <li class="breadcrumb-item small"><a href="javascript:void(0)" onclick="layout.render('Dashboard/Admin', 'Index')" class="text-decoration-none text-muted">Hệ thống Quản trị</a></li>
                        <li class="breadcrumb-item small active fw-bold text-accent">Mã giảm giá</li>
                    </ol>
                </nav>
                <h2 class="fw-bold font-serif mb-0">Khuyến mãi & Vouchers</h2>
            </div>
            <button onclick="vouchers.openCreate()" class="btn btn-accent rounded-pill px-4 fw-bold shadow-sm">
                <i class="icon icon-plus me-2"></i> Thêm Voucher mới
            </button>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden bg-white">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-4 py-3 border-0 text-uppercase small fw-bold text-muted">Mã giảm giá</th>
                            <th class="py-3 border-0 text-uppercase small fw-bold text-muted">Mức giảm</th>
                            <th class="py-3 border-0 text-uppercase small fw-bold text-muted">Đơn hàng tối thiểu</th>
                            <th class="py-3 border-0 text-uppercase small fw-bold text-muted">Hạn dùng & Trạng thái</th>
                            <th class="pe-4 py-3 border-0 text-uppercase small fw-bold text-muted text-end">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="vouchers-admin-list">
                        <tr><td colspan="5" class="text-center py-5">Đang tải danh sách mã giảm giá...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Voucher Modal -->
    <div class="modal fade" id="voucher-modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold font-serif px-2 mt-3" id="voucher-modal-title">Chi tiết Voucher</h5>
                    <button type="button" class="btn-close me-2" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted text-uppercase">Mã giảm giá (Code)</label>
                        <input type="text" id="v-code" class="form-control rounded-pill px-3 bg-light border-0" placeholder="Ví dụ: KM_HE_2024">
                    </div>
                    <div class="row g-3">
                        <div class="col-6">
                            <label class="form-label small fw-bold text-muted text-uppercase">Chiết khấu (%)</label>
                            <input type="number" id="v-discount" class="form-control rounded-pill px-3 bg-light border-0" value="10" min="1" max="100">
                        </div>
                        <div class="col-6">
                            <label class="form-label small fw-bold text-muted text-uppercase">Giá trị tối thiểu (đ)</label>
                            <input type="number" id="v-min" class="form-control rounded-pill px-3 bg-light border-0" value="0">
                        </div>
                    </div>
                    <div class="mt-3">
                        <label class="form-label small fw-bold text-muted text-uppercase">Ngày hết hạn</label>
                        <input type="date" id="v-expiry" class="form-control rounded-pill px-3 bg-light border-0">
                    </div>
                </div>
                <div class="modal-footer border-top-0 pt-0 p-4">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Hủy</button>
                    <button type="button" id="btn-save-voucher" class="btn btn-accent rounded-pill px-4 fw-bold shadow-sm">Lưu Voucher</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        vouchers.loadAdminList();
    })();
</script>
