<!-- Book Details View -->
<section class="bg-sand py-5">
    <div class="container-xl py-5">
        <div class="row g-5 align-items-start">
            <!-- Left: Product Image -->
            <div class="col-lg-5" data-aos="fade-right">
            <div class="product-image-container p-4 bg-white rounded-5 shadow-lg border border-5 border-white text-center">
                    <div style="height: 380px; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 12px; background: #F3F2EC;">
                        <img id="book-image" src="assets/images/main-banner2.jpg"
                             class="img-fluid rounded-3"
                             alt="Sách"
                             style="max-height: 380px; width: 100%; object-fit: contain; transition: transform 0.4s ease;">
                    </div>
                    <div class="mt-4 d-flex justify-content-center gap-2">
                        <button class="btn btn-light rounded-circle shadow-sm p-3"><i class="icon icon-search"></i></button>
                    </div>
                </div>
            </div>

            <!-- Right: Product Info -->
            <div class="col-lg-7 ps-lg-5" data-aos="fade-left">
                <div class="product-detail">
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb mb-4 py-2 px-3 bg-white rounded-pill shadow-sm d-inline-flex border">
                            <li class="breadcrumb-item small"><a href="javascript:void(0)" onclick="layout.render('', 'Home/Index')" class="text-decoration-none text-muted">Trang chủ</a></li>
                            <li class="breadcrumb-item small"><a href="javascript:void(0)" onclick="layout.render('Books', 'Index')" class="text-decoration-none text-muted">Cửa hàng</a></li>
                            <li class="breadcrumb-item small active text-accent fw-bold" id="breadcrumb-category">Chi tiết</li>
                        </ol>
                    </nav>

                    <h1 class="display-4 fw-bold mb-4 font-serif text-dark" id="book-title">---</h1>
                    
                    <div class="meta-row d-flex flex-wrap gap-4 mb-5 pb-4 border-bottom">
                        <div class="meta-item">
                            <span class="text-muted d-block small text-uppercase fw-bold tracking-widest">Tác giả</span>
                            <span class="fw-bold text-dark fs-5" id="book-author">---</span>
                        </div>
                        <div class="meta-item border-start ps-4">
                            <span class="text-muted d-block small text-uppercase fw-bold tracking-widest">Đánh giá</span>
                            <div class="text-warning small pt-1">
                                <i class="icon icon-star"></i><i class="icon icon-star"></i><i class="icon icon-star"></i><i class="icon icon-star"></i><i class="icon icon-star-half"></i>
                                <span class="ms-1 text-dark fw-bold">(4.8)</span>
                            </div>
                        </div>
                        <div class="meta-item border-start ps-4">
                            <span class="text-muted d-block small text-uppercase fw-bold tracking-widest">ISBN</span>
                            <span class="text-dark small" id="book-isbn">---</span>
                        </div>
                    </div>

                    <div class="price-box mb-5 d-flex align-items-baseline gap-3">
                        <span class="display-5 fw-bold text-accent" id="book-price">---</span>
                        <span class="text-muted text-decoration-line-through h4 mb-0 opacity-50" id="book-price-old">---</span>
                    </div>

                    <div class="description-box mb-5">
                        <h6 class="text-uppercase fw-bold tracking-widest small mb-4 text-accent border-start border-accent border-4 ps-3">Mô tả sản phẩm</h6>
                        <p id="book-description" class="text-muted lh-lg fs-5">
                            Đang tải mô tả sản phẩm...
                        </p>
                    </div>

                    <div class="purchase-box bg-white p-4 rounded-4 shadow-sm border border-opacity-10 border-dark mt-4">
                        <label class="form-label fw-bold text-muted mb-3 text-uppercase tracking-widest d-block" style="font-size: 0.75rem; letter-spacing: 1px;">Số lượng</label>
                        <div class="d-flex flex-wrap align-items-center gap-3 w-100">
                            <!-- Nút 1: Chỉnh số lượng (Giao diện Premium mới) -->
                            <div style="width: 120px; flex-shrink: 0;">
                                <div class="d-flex justify-content-between align-items-center bg-light rounded-pill border shadow-sm" style="height: 48px; padding: 0 6px;" id="qty-wrapper">
                                    <button type="button" class="btn btn-white rounded-circle shadow-sm border-0 d-flex align-items-center justify-content-center p-0" 
                                            style="width: 38px; height: 38px; background: white; transition: all 0.2s;"
                                            onclick="let i=document.getElementById('quantity'); i.stepDown(); document.getElementById('qty-display').textContent=i.value;"
                                            onmouseover="this.style.transform='scale(1.1)'; this.style.background='#f8f9fa'"
                                            onmouseout="this.style.transform='scale(1)'; this.style.background='white'">
                                        <span style="font-size: 1.5rem; line-height: 1; margin-top: -4px; font-weight: 300;">-</span>
                                    </button>
                                    
                                    <span id="qty-display" class="fw-bolder" style="flex: 1; text-align: center; font-size: 1.1rem; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100%; color: #111;">1</span>
                                    <input type="number" id="quantity" value="1" min="1" style="display: none;">

                                    <button type="button" class="btn btn-white rounded-circle shadow-sm border-0 d-flex align-items-center justify-content-center p-0" 
                                            style="width: 38px; height: 38px; background: white; transition: all 0.2s;"
                                            onclick="let i=document.getElementById('quantity'); i.stepUp(); document.getElementById('qty-display').textContent=i.value;"
                                            onmouseover="this.style.transform='scale(1.1)'; this.style.background='#f8f9fa'"
                                            onmouseout="this.style.transform='scale(1)'; this.style.background='white'">
                                        <span style="font-size: 1.4rem; line-height: 1; font-weight: 300;">+</span>
                                    </button>
                                </div>
                                <style>
                                    #qty-wrapper input[type=number]::-webkit-inner-spin-button, 
                                    #qty-wrapper input[type=number]::-webkit-outer-spin-button { 
                                        -webkit-appearance: none; margin: 0; display: none;
                                    }
                                </style>
                            </div>
                            <!-- Nút 2: Thêm giỏ hàng -->
                            <div class="flex-grow-1" style="min-width: 200px;">
                                <button type="button" id="btn-add-to-cart" class="btn btn-accent w-100 fw-bold shadow-sm rounded-pill transition-all" style="height: 48px; font-size: 16px; text-transform: uppercase;" onclick="cart.handleAdd()">
                                    Thêm vào giỏ <i class="icon icon-clipboard ms-1"></i>
                                </button>
                            </div>
                            <!-- Nút 3: Quay lại -->
                            <div style="flex-shrink: 0; min-width: 115px;">
                                <button class="btn btn-outline-dark w-100 px-3 fw-bold rounded-pill shadow-none hvr-accent" style="height: 48px; font-size: 14px;"
                                        onclick="layout.render('Home', 'Index', null, 'featured-books')"
                                        title="Quay lại trang chính">
                                    <i class="icon icon-ns-arrow-left me-1"></i> Quay lại
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Related Products Section -->
<section id="related-products" class="py-5 bg-white border-top">
    <div class="container-xl py-5">
        <div class="section-header mb-5 d-flex justify-content-between align-items-end">
            <div>
                <span class="text-uppercase tracking-widest text-accent fw-bold small">Có thể bạn thích</span>
                <h2 class="display-6 fw-bold font-serif m-0">Sách cùng thể loại</h2>
            </div>
            <a href="javascript:void(0)" onclick="layout.render('Books', 'Index')" class="text-accent fw-bold text-decoration-none">Xem toàn bộ <i class="icon icon-ns-arrow-right"></i></a>
        </div>
        <div class="row g-4" id="related-books-grid">
            <!-- Will be populated by books.js -->
            <div class="col-12 text-center py-4 text-muted small italic">Đang tìm sách liên quan...</div>
        </div>
    </div>
</section>

<!-- Reviews Section -->
<section id="reviews-area" class="py-5 bg-sand">
    <div class="container-xl py-5">
        <div class="row">
            <div class="col-lg-8">
                <h3 class="fw-bold font-serif mb-5 pb-3 border-bottom">Đánh giá từ khách hàng</h3>
                <div id="reviews-container">
                    <!-- Reviews populated by reviews.js -->
                    <div class="text-center py-4 text-muted small italic">Chưa có đánh giá nào.</div>
                </div>

                <div class="review-form-container mt-5 p-5 bg-white shadow-lg rounded-5 border border-accent border-opacity-10">
                    <h5 class="fw-bold font-serif mb-4">Gửi nhận xét của bạn</h5>
                    <div id="review-form" class="row g-3">
                        <div class="col-md-4">
                            <label class="small fw-bold text-muted mb-2">Điểm đánh giá</label>
                            <select id="review-rating" class="form-select rounded-pill border-light bg-light">
                                <option value="5">5 ★★★★★ (Tuyệt vời)</option>
                                <option value="4">4 ★★★★☆ (Hài lòng)</option>
                                <option value="3">3 ★★★☆☆ (Bình thường)</option>
                                <option value="2">2 ★★☆☆☆ (Kém)</option>
                                <option value="1">1 ★☆☆☆☆ (Rất kém)</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="small fw-bold text-muted mb-2">Nhận xét chi tiết</label>
                            <textarea id="review-comment" class="form-control rounded-4 border-light bg-light" rows="4" placeholder="Chia sẻ cảm nhận của bạn về cuốn sách này..."></textarea>
                        </div>
                        <div class="col-12 mt-4 text-end">
                            <button type="button" id="btn-submit-review" class="btn btn-accent px-5 py-3 rounded-pill fw-bold shadow-sm">
                                Gửi đánh giá ngay
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <!-- Sidebar components -->
            </div>
        </div>
    </div>
</section>

<script>
    if (typeof AOS !== 'undefined') AOS.refresh();
</script>
