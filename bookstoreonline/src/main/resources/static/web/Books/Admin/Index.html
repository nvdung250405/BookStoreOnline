<!-- Admin Books Area - List View -->
<div class="p-4 p-md-5 w-100 bg-light min-vh-100">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-2">
                    <li class="breadcrumb-item small"><a href="javascript:void(0)" onclick="layout.render('Dashboard/Admin', 'Index')" class="text-decoration-none text-muted">Admin Hub</a></li>
                    <li class="breadcrumb-item small active fw-bold text-accent">Catalog</li>
                </ol>
            </nav>
            <h2 class="fw-bold font-serif mb-0 text-dark">Book Inventory Management</h2>
        </div>
        <button onclick="layout.render('Books', 'Admin/Create')" class="btn btn-accent px-4 py-2 rounded-pill fw-bold shadow-sm hvr-float">
            <i class="icon icon-plus me-2"></i> Add New Book
        </button>
    </div>

    <!-- Filter Bar -->
    <div class="card border-0 shadow-sm rounded-4 p-3 mb-4 bg-white">
        <div class="row g-3 align-items-center">
            <div class="col-md-5">
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="icon icon-search"></i></span>
                    <input type="text" class="form-control border-start-0 shadow-none bg-transparent" placeholder="Search by title, ISBN, author..." id="book-search-input"
                           onkeyup="books.adminSearch(this.value)">
                </div>
            </div>
            <div class="col-md-4 ms-auto text-end">
                <button class="btn btn-outline-dark rounded-pill px-4" onclick="books.toggleAdvancedFilters()">Advanced Filters</button>
            </div>
        </div>
    </div>

    <!-- Books Table -->
    <div class="card border-0 shadow-sm rounded-5 overflow-hidden bg-white">
        <div class="table-responsive">
            <table class="table align-middle table-hover mb-0">
                <thead class="bg-light text-muted extra-small text-uppercase fw-bold border-0">
                    <tr>
                        <th class="ps-4 py-3">Book Information</th>
                        <th class="py-3">Category</th>
                        <th class="py-3">Unit Price</th>
                        <th class="py-3">Stock Quantity</th>
                        <th class="text-end pe-4 py-3">Operations</th>
                    </tr>
                </thead>
                <tbody id="books-admin-list">
                    <!-- Loaded via books.js -->
                    <tr><td colspan="5" class="text-center py-5"><div class="spinner-border text-accent"></div></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
