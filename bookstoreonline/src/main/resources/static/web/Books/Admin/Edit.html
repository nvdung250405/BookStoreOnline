<!-- Admin Books - Edit Product -->
<div class="p-4 p-md-5 w-100 bg-light min-vh-100">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-2">
                    <li class="breadcrumb-item small"><a href="javascript:void(0)" onclick="layout.render('Books', 'Admin/Index')" class="text-decoration-none text-muted">Quản lý sách</a></li>
                    <li class="breadcrumb-item small active fw-bold text-accent">Chỉnh sửa</li>
                </ol>
            </nav>
            <h2 class="fw-bold font-serif mb-0 text-dark">Chỉnh sửa thông tin sách</h2>
        </div>
        <div class="d-flex gap-2">
            <button onclick="layout.render('Books', 'Admin/Index')" class="btn btn-outline-dark rounded-pill px-4">Hủy</button>
            <button id="btn-update-book" class="btn btn-accent rounded-pill px-4 fw-bold shadow-sm">Cập nhật</button>
        </div>
    </div>

    <form id="edit-book-form">
        <div class="row g-4">
            <!-- Left: Main Info -->
            <div class="col-lg-8">
                <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
                    <h5 class="fw-bold mb-4 border-bottom pb-2">Thông tin cơ bản</h5>
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label small fw-bold">Tên sách <span class="text-danger">*</span></label>
                            <input type="text" name="title" id="edit-title" class="form-control rounded-pill px-3" placeholder="Nhập tên sách..." required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Mã ISBN (không thể đổi)</label>
                            <input type="text" id="edit-isbn-display" class="form-control rounded-pill px-3 bg-light" readonly>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Danh mục <span class="text-danger">*</span></label>
                            <select name="categoryId" id="maDanhMuc" class="form-select rounded-pill px-3" required>
                                <option value="">-- Đang tải danh mục... --</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Nhà xuất bản</label>
                            <select name="publisherId" id="maNxb" class="form-select rounded-pill px-3">
                                <option value="">-- Đang tải NXB... --</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Tác giả</label>
                            <select name="authorId" id="maTacGia" class="form-select rounded-pill px-3">
                                <option value="">-- Đang tải tác giả... --</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-bold">Mô tả sản phẩm</label>
                            <textarea name="description" id="edit-description" class="form-control rounded-4 px-3" rows="5" placeholder="Nhập mô tả chi tiết sách..."></textarea>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
                    <h5 class="fw-bold mb-4 border-bottom pb-2">Phân loại sách</h5>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Loại sách <span class="text-danger">*</span></label>
                            <div class="d-flex gap-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="bookType" id="type-physical" value="PHYSICAL" onchange="books.toggleTypeFields()">
                                    <label class="form-check-label" for="type-physical">Sách vật lý</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="bookType" id="type-ebook" value="EBOOK" onchange="books.toggleTypeFields()">
                                    <label class="form-check-label" for="type-ebook">Ebook (Sách điện tử)</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Physical Fields -->
                <div id="physical-fields-section" class="card border-0 shadow-sm rounded-4 p-4 mb-4">
                    <h5 class="fw-bold mb-4 border-bottom pb-2">Thông số vật lý</h5>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Trọng lượng (g) <span class="text-danger text-req">*</span></label>
                            <input type="number" name="weight" id="edit-weight" class="form-control rounded-pill" placeholder="VD: 350">
                        </div>
                    </div>
                </div>

                <!-- Ebook Fields -->
                <div id="ebook-fields-section" class="card border-0 shadow-sm rounded-4 p-4 mb-4 d-none">
                    <h5 class="fw-bold mb-4 border-bottom pb-2">Chi tiết Ebook</h5>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Dung lượng file (MB) <span class="text-danger text-req">*</span></label>
                            <input type="number" name="fileSize" id="edit-fileSize" class="form-control rounded-pill" placeholder="VD: 5.2" step="0.1">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Link tải trực tiếp <span class="text-danger text-req">*</span></label>
                            <input type="url" name="downloadUrl" id="edit-downloadUrl" class="form-control rounded-pill" placeholder="https://...">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Pricing & Image -->
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
                    <h5 class="fw-bold mb-4 border-bottom pb-2">Giá & Kho hàng</h5>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Giá niêm yết (VNĐ) <span class="text-danger">*</span></label>
                        <input type="number" name="price" id="edit-price"
                            class="form-control rounded-pill border-accent fw-bold" required min="1000"
                            oninput="document.getElementById('edit-price-display').innerText = api.formatCurrency(this.value || 0)">
                    </div>
                    <div>
                        <label class="form-label small fw-bold">Giá hiển thị</label>
                        <div id="edit-price-display" class="fs-4 fw-bold text-accent">---</div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-4 p-4">
                    <h5 class="fw-bold mb-4 border-bottom pb-2">Hình ảnh bìa</h5>
                    <div class="text-center mb-3">
                        <div id="clickable-preview" class="rounded-4 bg-light d-flex align-items-center justify-content-center border-dashed position-relative overflow-hidden" style="height:280px; cursor:pointer;" onclick="document.getElementById('image-upload-input').click()">
                            <div id="preview-placeholder" class="text-center d-none">
                                <i class="icon icon-plus fs-1 text-muted"></i>
                                <p class="small text-muted mb-0">Chọn ảnh</p>
                            </div>
                            <img id="book-preview-img" src="" class="img-fluid rounded-4" style="max-height:260px;object-fit:contain; z-index:1;">
                            <div id="upload-overlay" class="position-absolute top-0 start-0 w-100 h-100 d-none flex-column align-items-center justify-content-center rounded-4" style="background:rgba(255,255,255,0.8); z-index:10;">
                                <div class="spinner-border text-accent mb-2"></div>
                                <small class="fw-bold">Đang tải lên...</small>
                            </div>
                        </div>
                    </div>
                    <input type="file" id="image-upload-input" class="d-none" accept="image/*" onchange="books.handleImageUpload(this)">
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 rounded-start-pill"><i class="icon icon-image"></i></span>
                        <input type="text" name="coverImage" id="edit-anhBia" class="form-control rounded-end-pill small bg-light" 
                               placeholder="Tên file hệ thống..." readonly required>
                    </div>
                    <div id="file-info" class="mt-2 text-center d-none">
                        <small class="text-muted">Tên gốc: <span id="original-filename-info" class="fw-bold"></span></small>
                    </div>
                    <small class="text-muted mt-2 d-block text-center">Nhấp vào ảnh để thay đổi</small>
                </div>
            </div>
        </div>
    </form>
</div>

<script>
async function loadBookForEdit(isbn) {
    try {
        // Load dropdowns first
        await Promise.all([
            books.loadCategoriesIntoForm(),
            books.loadAuthors(),
            books.loadPublishers()
        ]);

        const res = await api.get(`/books/${isbn}`);
        const b = res.data || res;

        // Store ISBN on button
        const btn = document.getElementById('btn-update-book');
        if (btn) btn.dataset.isbn = b.isbn || isbn;
        
        // Map fields to form elements
        if (document.getElementById('edit-isbn-display')) document.getElementById('edit-isbn-display').value = b.isbn || isbn;
        if (document.getElementById('edit-title')) document.getElementById('edit-title').value = b.title || '';
        if (document.getElementById('edit-description')) document.getElementById('edit-description').value = b.description || '';
        if (document.getElementById('edit-price')) document.getElementById('edit-price').value = b.price || '';
        
        const priceDisplay = document.getElementById('edit-price-display');
        if (priceDisplay) priceDisplay.innerText = api.formatCurrency(b.price || 0);
        
        if (document.getElementById('edit-anhBia')) document.getElementById('edit-anhBia').value = b.coverImage || '';
        
        const preview = document.getElementById('book-preview-img');
        const placeholder = document.getElementById('preview-placeholder');
        if (preview && b.coverImage) {
            preview.src = 'assets/images/' + b.coverImage;
            preview.classList.remove('d-none');
            if (placeholder) placeholder.classList.add('d-none');
        } else if (placeholder) {
            placeholder.classList.remove('d-none');
            if (preview) preview.classList.add('d-none');
        }

        // Subtype specific fields
        if (b.downloadUrl || b.fileSize) {
            document.getElementById('type-ebook').checked = true;
            if (document.getElementById('edit-fileSize')) document.getElementById('edit-fileSize').value = b.fileSize || '';
            if (document.getElementById('edit-downloadUrl')) document.getElementById('edit-downloadUrl').value = b.downloadUrl || '';
        } else {
            document.getElementById('type-physical').checked = true;
            if (document.getElementById('edit-weight')) document.getElementById('edit-weight').value = b.weight || '';
        }
        books.toggleTypeFields();

        // Set dropdown values
        if (document.getElementById('maDanhMuc')) document.getElementById('maDanhMuc').value = b.categoryId || '';
        if (document.getElementById('maNxb')) document.getElementById('maNxb').value = b.publisherId || '';
        if (document.getElementById('maTacGia') && b.authorIds && b.authorIds.length > 0) {
            document.getElementById('maTacGia').value = b.authorIds[0];
        }

    } catch (e) {
        console.error(e);
        api.showToast('Không thể tải dữ liệu sách: ' + e.message, 'error');
    }
}
window.loadBookForEdit = loadBookForEdit;
</script>

<style>
    .border-dashed { border: 2px dashed #dee2e6; }
    .btn-accent { background-color: #C5A992; color: white; border: none; }
    .btn-accent:hover { background-color: #2F2F2F; }
</style>
