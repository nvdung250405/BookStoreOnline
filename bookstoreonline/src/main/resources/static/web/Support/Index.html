<div class="support-page py-5 bg-sand min-vh-100">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h2 class="fw-bold mb-1">Hỗ trợ khách hàng</h2>
                <p class="text-muted mb-0">Theo dõi yêu cầu hỗ trợ và nhận trợ giúp từ đội ngũ Booksaw</p>
            </div>
            <button class="btn btn-dark rounded-pill px-4 shadow-sm"
                    onclick="support.openCreateTicket()">
                <i class="icon icon-plus me-2"></i>Tạo yêu cầu mới
            </button>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden bg-white">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light text-muted small text-uppercase fw-bold">
                        <tr>
                            <th class="ps-4 py-3">Tiêu đề</th>
                            <th class="py-3">Ngày tạo</th>
                            <th class="py-3">Trạng thái</th>
                            <th class="py-3 text-end pe-4">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="support-list-body" class="border-top-0">
                        <!-- Loaded by support.loadUserTickets() -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal tạo ticket mới -->
<div class="modal fade" id="support-modal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content border-0 rounded-4">
            <div class="modal-header border-0 bg-light rounded-top-4">
                <h5 class="modal-title fw-bold">Gửi yêu cầu hỗ trợ</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form id="support-form">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Tiêu đề <span class="text-danger">*</span></label>
                        <input type="text" class="form-control rounded-pill" id="support-title"
                               placeholder="VD: Lỗi thanh toán, Đổi trả hàng..." required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Mô tả chi tiết <span class="text-danger">*</span></label>
                        <textarea class="form-control rounded-4" id="support-content" rows="5"
                                  placeholder="Mô tả vấn đề của bạn..." required></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 bg-light rounded-bottom-4">
                <button type="button" class="btn btn-light rounded-pill" data-bs-dismiss="modal">Hủy</button>
                <button type="button" class="btn btn-dark rounded-pill px-4"
                        onclick="support.submitTicket()">Gửi yêu cầu</button>
            </div>
        </div>
    </div>
</div>

<style>
    .bg-sand { background-color: #FDFCF9; }
</style>
