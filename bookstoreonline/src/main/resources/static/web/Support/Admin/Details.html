<div class="p-4 p-md-5 w-100">
    <main class="flex-grow-1 p-4 p-md-5">
        <div class="mb-4">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb mb-2">
                    <li class="breadcrumb-item small"><a href="javascript:void(0)"
                            onclick="layout.render('Dashboard/Admin', 'Index')"
                            class="text-decoration-none text-muted">Hệ thống Quản trị</a></li>
                    <li class="breadcrumb-item small"><a href="javascript:void(0)"
                            onclick="layout.render('Support/Admin', 'Index')"
                            class="text-decoration-none text-muted">Phiếu hỗ trợ</a></li>
                    <li class="breadcrumb-item small active fw-bold text-accent">Chi tiết Phiếu</li>
                </ol>
            </nav>
            <h2 class="fw-bold font-serif mb-0">Chi tiết Yêu cầu Hỗ trợ</h2>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card border-0 shadow-sm rounded-4 mb-4 p-4 bg-white">
                    
                    <div class="row align-items-center mb-4 pb-3 border-bottom g-3">
                        <div class="col-md-6">
                            <h4 class="fw-bold mb-1" id="ticket-detail-title">Tiêu đề phiếu</h4>
                            <small class="text-muted" id="ticket-detail-id">ID: #---</small>
                        </div>

                        <div class="col-md-6 d-flex flex-column flex-sm-row justify-content-md-end align-items-sm-center gap-3">
                            
                            <div class="d-flex align-items-center gap-2 bg-light p-1 pe-2 rounded-pill border">
                                <span class="small text-muted fw-bold ms-3 text-nowrap d-flex align-items-center" style="height: 100%; padding-top: 2px;">Trạng thái:</span>
                                
                                <select class="form-select form-select-sm rounded-pill border-0 bg-white fw-bold shadow-sm text-dark m-0" id="target-status" style="width: auto; cursor: pointer;">
                                    <option value="OPEN">Mở (Open)</option>
                                    <option value="PROCESSING">Đang xử lý</option>
                                    <option value="CLOSED">Đã đóng</option>
                                </select>
                            </div>

                            <div class="d-flex gap-2">
                                <button class="btn btn-light btn-sm rounded-pill px-3 shadow-sm border fw-bold d-flex align-items-center"
                                    onclick="layout.render('Support/Admin', 'Index')">
                                    <i class="icon icon-arrow-left me-1"></i> Quay lại
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="alert alert-light border-0 bg-light rounded-3 p-4 mb-4">
                        <p class="mb-0 text-dark fs-6" id="ticket-detail-content">Đang tải nội dung...</p>
                    </div>

                    <div class="row mb-4 bg-light p-3 rounded-3 mx-0">
                        <div class="col-md-4 mb-3 mb-md-0">
                            <small class="text-uppercase text-muted extra-small fw-bold d-block mb-1">Khách hàng</small>
                            <strong id="ticket-customer-name" class="text-accent">---</strong>
                        </div>
                        <div class="col-md-4 mb-3 mb-md-0">
                            <small class="text-uppercase text-muted extra-small fw-bold d-block mb-1">Ngày tạo</small>
                            <strong id="ticket-created-date">---</strong>
                        </div>
                        <div class="col-md-4">
                            <small class="text-uppercase text-muted extra-small fw-bold d-block mb-1">Cập nhật cuối</small>
                            <strong id="ticket-updated-date">---</strong>
                        </div>
                    </div>

                    <hr class="my-4 opacity-25">

                    <h5 class="fw-bold mb-3">Lịch sử Trao đổi & Ghi chú</h5>
                    <div id="comments-list" class="mb-4">
                        <div class="text-center py-4 text-muted small bg-light rounded-3">Chưa có phản hồi nào.</div>
                    </div>

                    <div id="response-form-container" class="card border border-light shadow-none bg-light rounded-4 p-4 mt-4">
                        <h6 class="fw-bold mb-3"><i class="icon icon-reply me-2"></i>Xử lý Phiếu hỗ trợ</h6>

                        <div class="row g-3">
                            <div class="col-md-12">
                                <label class="form-label small text-muted fw-bold">Phản hồi khách hàng</label>
                                <textarea class="form-control rounded-4 border-0 p-3 shadow-sm" id="admin-reply" rows="3"
                                    placeholder="Nội dung này sẽ hiển thị cho khách hàng..."></textarea>
                            </div>

                            <div class="col-md-12">
                                <label class="form-label small text-muted fw-bold">Ghi chú nội bộ (Chỉ Admin thấy)</label>
                                <textarea class="form-control rounded-4 border-0 p-3 shadow-sm" id="internal-note" rows="2"
                                    placeholder="Ghi chú cho các nhân viên khác đọc..."></textarea>
                            </div>

                            <div class="col-12 text-end mt-4">
                                <button onclick="support.submitResponse()"
                                    class="btn btn-accent rounded-pill px-5 py-2 fw-bold shadow-sm">
                                    Lưu cập nhật
                                </button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>
</div>

<style>
    .extra-small { font-size: 0.75rem; }
    .form-select:focus { box-shadow: none; outline: none; }
    .btn-outline-danger:hover { background-color: #dc3545 !important; color: white !important; }
</style>

<script>
    (function () {
        setTimeout(() => {
            if (currentTicketId) {
                support.loadTicketDetails(currentTicketId);
            } else {
                console.error("Lỗi: Không tìm thấy ID phiếu hỗ trợ!");
            }
        }, 50);
    })();
</script>
