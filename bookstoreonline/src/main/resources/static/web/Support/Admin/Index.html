<div class="p-4 p-md-5 w-100">

    <main class="flex-grow-1 p-4 p-md-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-2">
                        <li class="breadcrumb-item small"><a href="javascript:void(0)" onclick="layout.render('Dashboard/Admin', 'Index')" class="text-decoration-none text-muted">Hệ thống Quản trị</a></li>
                        <li class="breadcrumb-item small active fw-bold text-accent">Hỗ trợ Khách hàng</li>
                    </ol>
                </nav>
                <h2 class="fw-bold font-serif mb-0">Quản lý Phiếu hỗ trợ</h2>
                <small class="text-muted">Xem xét và phản hồi các yêu cầu hỗ trợ cũng như khiếu nại từ khách hàng</small>
            </div>
        </div>

        <!-- Filter & Search -->
        <div class="row mb-4 bg-white p-3 rounded-4 shadow-sm mx-0 align-items-center g-3">
            <div class="col-md-5">
                <input type="text" class="form-control rounded-3 border-0 bg-light py-2" id="support-search" placeholder="Tìm theo tiêu đề hoặc khách hàng...">
            </div>
            
            <div class="col-md-3">
                <select class="form-select rounded-3 border-0 bg-light py-2" id="support-status-filter">
                    <option value="">-- Tất cả Trạng thái --</option>
                    <option value="OPEN">Mở (Mới)</option>
                    <option value="PROCESSING">Đang xử lý</option>
                    <option value="CLOSED">Đã hoàn thành/Đóng</option>
                </select>
            </div>
            
            <div class="col-md-auto">
                <button class="btn btn-accent rounded-pill px-4 py-2 fw-bold w-100" onclick="support.loadAdminTickets()">
                    <i class="icon icon-search me-2"></i> Lọc danh sách
                </button>
            </div>
        </div>

        <!-- Tickets Table -->
        <div class="card border-0 shadow-sm rounded-5 overflow-hidden bg-white">
            <div class="table-responsive">
                <table class="table align-middle table-hover mb-0">
                    <thead class="bg-light text-muted extra-small text-uppercase fw-bold border-0">
                        <tr>
                            <th class="ps-4 py-3">Mã phiếu</th>
                            <th class="py-3">Khách hàng</th>
                            <th class="py-3">Chủ đề / Tiêu đề</th>
                            <th class="py-3">Trạng thái</th>
                            <th class="py-3">Ngày tạo</th>
                            <th class="text-end pe-4 py-3">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="support-list-body">
                        <tr>
                            <td colspan="6" class="text-center py-5">
                                <div class="spinner-border text-accent spinner-border-sm" role="status"></div>
                                <span class="ms-2 text-muted">Đang truy xuất dữ liệu hỗ trợ...</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<style>
    .extra-small { font-size: 0.7rem; letter-spacing: 0.05em; }
</style>

<script>
    $(document).ready(function() {
        support.loadAdminTickets();
    });
</script>
