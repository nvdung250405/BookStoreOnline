<!-- Inventory Import View -->
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-12">
            <div class="card border-0 shadow-sm rounded-4 p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3 class="fw-bold font-serif mb-0"><i class="icon icon-plus me-2 text-accent"></i> Lập phiếu nhập hàng</h3>
                    <a href="javascript:void(0)" onclick="layout.render('Inventory/Admin', 'Index')" class="btn btn-outline-dark rounded-pill px-4">Quay lại</a>
                </div>

                <form id="inventory-import-form" class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Nhà cung cấp</label>
                        <select id="supplier-id" class="form-select border-light bg-light rounded-3" required>
                            <option value="">Chọn nhà cung cấp...</option>
                            <!-- Options load via inventory.js -->
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Kho nhập</label>
                        <input type="text" class="form-control border-light bg-light" value="Kho chính - HCM" readonly>
                    </div>

                    <div class="col-12 mt-4">
                        <h5 class="fw-bold border-bottom pb-2">Danh sách sản phẩm</h5>
                        <div class="table-responsive">
                            <table class="table align-middle" id="import-items-table">
                                <thead class="bg-light">
                                    <tr>
                                        <th>Sản phẩm (ISBN)</th>
                                        <th width="150">Số lượng</th>
                                        <th width="200">Giá nhập</th>
                                        <th>Thành tiền</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- Rows added dynamically -->
                                </tbody>
                            </table>
                        </div>
                        <button type="button" onclick="inventory.addImportRow()" class="btn btn-sm btn-accent rounded-pill px-3 mt-2">+ Thêm dòng</button>
                    </div>

                    <div class="col-12 text-end mt-5">
                        <div class="fs-4 fw-bold mb-3">Tổng giá trị: <span id="total-import-value" class="text-accent">0đ</span></div>
                        <button type="submit" class="btn btn-dark btn-lg px-5 rounded-pill shadow-sm">Xác nhận nhập kho</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
