<div class="admin-inventory-page p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold mb-1">Quản lý Kho hàng</h3>
            <p class="text-muted small mb-0">Theo dõi mức tồn kho, cảnh báo hàng sắp hết và biến động kho</p>
        </div>
        <div class="d-flex gap-2">
             <button class="btn btn-outline-danger rounded-pill px-3 shadow-sm" onclick="layout.render('Inventory/Admin', 'Adjustment')">
                <i class="icon icon-wrench-outline"></i> Điều chỉnh Tồn kho
            </button>
             <button class="btn btn-outline-accent rounded-pill px-3 shadow-sm" onclick="layout.render('Inventory/Admin', 'Export')">
                <i class="icon icon-outbox"></i> Xuất kho
            </button>
            <button class="btn btn-accent rounded-pill px-3 shadow-sm" onclick="layout.render('Inventory/Admin', 'Import')">
                <i class="icon icon-inbox"></i> Nhập kho hàng
            </button>
        </div>
    </div>

    <!-- Stats -->
    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="card border-0 shadow-sm rounded-4 p-3 bg-white">
                <div class="text-muted small mb-1">Tổng cộng các đầu sách</div>
                <div class="h4 fw-bold mb-0" id="total-inventory-items">---</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm rounded-4 p-3 bg-white">
                <div class="text-muted small mb-1">Cảnh báo sắp hết hàng</div>
                <div class="h4 fw-bold mb-0 text-danger" id="low-stock-count">0</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-0 shadow-sm rounded-4 p-3 bg-white">
                <div class="text-muted small mb-1">Tổng giá trị tồn kho ước tính</div>
                <div class="h4 fw-bold mb-0 text-accent" id="total-inventory-value">---</div>
            </div>
        </div>
    </div>

    <!-- Search & List -->
    <div class="card border-0 shadow-sm rounded-4 overflow-hidden bg-white mb-4">
        <div class="p-4 border-bottom bg-light d-flex justify-content-between align-items-center flex-wrap gap-3">
            <div class="position-relative flex-grow-1" style="max-width: 350px;">
                <input type="text" class="form-control rounded-pill pe-5 bg-white border-0 shadow-sm py-2" placeholder="Tìm nhanh ISBN hoặc Tên sách..." id="inventory-search" oninput="inventory.filterStock(this.value)">
                <input type="text" class="form-control rounded-pill pe-5 bg-white border-0 shadow-sm py-2" placeholder="Quick lookup ISBN or Name..." id="inventory-search" oninput="inventory.filterStock(this.value)">
            </div>
            
            <div class="d-flex gap-3 align-items-center">
                <button class="btn btn-accent rounded-pill px-3 shadow-sm" onclick="layout.render('Books/Admin', 'Create')">
                    <i class="icon icon-plus me-1"></i> Thêm Sách mới
                </button>
                <div class="d-flex align-items-center gap-2">
                   <span class="small fw-bold text-muted mb-0">Lọc theo:</span>
                   <select class="form-select border-0 bg-white shadow-sm rounded-pill w-auto py-2" id="inventory-filter" onchange="inventory.filterStatus(this.value)">
                       <option value="ALL">Tất cả sản phẩm</option>
                       <option value="LOW_STOCK">Sắp hết hàng / Cần nhập</option>
                       <option value="IN_STOCK">Tồn kho ổn định</option>
                    <i class="icon icon-plus me-1"></i> Add Item
                </button>
                <div class="d-flex align-items-center gap-2">
                   <span class="small fw-bold text-muted mb-0">Filter:</span>
                   <select class="form-select border-0 bg-white shadow-sm rounded-pill w-auto py-2" id="inventory-filter" onchange="inventory.filterStatus(this.value)">
                       <option value="ALL">All Products</option>
                       <option value="LOW_STOCK">Critical / Low Stock</option>
                       <option value="IN_STOCK">Healthy Inventory</option>
                   </select>
                </div>
            </div>
        </div>
        
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light text-muted extra-small text-uppercase fw-bold border-0">
                    <tr>
                        <th class="ps-4 py-3">Sản phẩm</th>
                        <th class="py-3 text-center">Tồn thực tế</th>
                        <th class="py-3">Vị trí kệ / Giá tham chiếu</th>
                        <th class="py-3">Trạng thái</th>
                        <th class="py-3 text-end pe-4">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="inventory-admin-body">
                    <tr>
                        <td colspan="5" class="text-center py-5">
                            <div class="spinner-border spinner-border-sm text-accent"></div>
                            <span class="ms-2">Đang đồng bộ dữ liệu kho...</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="modal fade" id="inventoryEditModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold">Edit Inventory Data</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="edit-inv-isbn">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Book Title</label>
                        <input type="text" class="form-control rounded-3 bg-light" id="edit-inv-title" readonly disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Stock Quantity (Tồn kho)</label>
                        <input type="number" class="form-control rounded-3" id="edit-inv-stock" min="0">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Shelf Location (Vị trí kệ)</label>
                        <input type="text" class="form-control rounded-3" id="edit-inv-shelf" placeholder="Ví dụ: Kệ A-12">
                    </div>
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-accent rounded-pill px-4" onclick="inventory.saveStock()">Save Changes</button>
                </div>
            </div>
        </div>
    </div>
</div>
