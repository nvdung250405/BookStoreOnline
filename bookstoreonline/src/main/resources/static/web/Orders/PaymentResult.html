<div class="payment-result-page py-5 bg-light">
    <div class="container text-center py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card border-0 shadow-lg rounded-5 p-5 bg-white">
                    <div id="result-success" class="result-content" style="display:none;">
                        <div class="icon-box bg-success-subtle text-success d-inline-flex p-4 rounded-circle mb-4">
                            <i class="icon icon-check fs-1"></i>
                        </div>
                        <h2 class="fw-bold mb-3">Đặt hàng thành công!</h2>
                        <p class="text-muted mb-4">Cảm ơn bạn đã tin tưởng Booksaw. Đơn hàng của bạn đang được xử lý và sẽ sớm được giao đến bạn.</p>
                        <div class="alert alert-light border-0 bg-light rounded-4 text-start p-3 mb-4">
                            <div class="d-flex justify-content-between mb-1 small text-muted">
                                <span>Mã đơn hàng:</span>
                                <span class="fw-bold text-dark" id="order-id-success">#12345</span>
                            </div>
                            <div class="d-flex justify-content-between small text-muted">
                                <span>Trạng thái:</span>
                                <span class="badge bg-success small">Đã xác nhận</span>
                            </div>
                        </div>
                    </div>

                    <div id="result-failed" class="result-content" style="display:none;">
                        <div class="icon-box bg-danger-subtle text-danger d-inline-flex p-4 rounded-circle mb-4">
                            <i class="icon icon-close fs-1"></i>
                        </div>
                        <h2 class="fw-bold mb-3">Thanh toán thất bại</h2>
                        <p class="text-muted mb-4">Rất tiếc, đã có lỗi xảy ra trong quá trình thanh toán qua cổng VNPay. Vui lòng thử lại hoặc chọn phương thức khác.</p>
                    </div>

                    <div class="d-grid gap-3">
                        <button class="btn btn-accent rounded-pill py-3 fw-bold" onclick="layout.render('', 'Home/Index')">
                            Tiếp tục mua sắm <i class="icon icon-arrow-right ms-2"></i>
                        </button>
                        <button class="btn btn-light rounded-pill py-3 text-muted" onclick="layout.render('Orders', 'History')">
                            Xem lịch sử đơn hàng
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (async function() {
        // Chờ một chút để layout manager cập nhật current id và hash thay đổi xong
        await new Promise(resolve => setTimeout(resolve, 150));

        const params = new URLSearchParams(window.location.search);
        const vnpResponse = params.get('vnp_ResponseCode');
        
        // Lấy Order ID từ hash (chính xác nhất cho SPA)
        let orderId = null;
        const hashParts = window.location.hash.split('/');
        if (hashParts.length >= 4 || (hashParts.length >= 3 && hashParts[1] === 'Orders')) {
            orderId = hashParts[hashParts.length - 1].split('?')[0];
        }

        // Nếu hash không có, thử lấy từ query params (vnp_TxnRef của VNPay có dạng ID_Timestamp)
        if (!orderId || orderId === 'error' || orderId === 'PaymentResult') {
            orderId = params.get('orderId');
            if (!orderId && params.get('vnp_TxnRef')) {
                orderId = params.get('vnp_TxnRef').split('_')[0];
            }
        }

        console.log("Checking payment result for Order ID:", orderId);

        if (orderId && orderId !== 'error' && orderId !== 'PaymentResult') {
            try {
                const response = await api.get('/orders/' + orderId);
                const order = api.parseResponse(response);
                
                $(".result-content").hide();
                if (order && order.status !== 'CANCELLED') {
                    $("#result-success").fadeIn();
                    $("#order-id-success").text("#" + orderId);
                } else {
                    $("#result-failed").fadeIn();
                }
            } catch (e) {
                console.error("Failed to fetch order status:", e);
                $(".result-content").hide();
                if (vnpResponse === '00') {
                    $("#result-success").fadeIn();
                    $("#order-id-success").text("#" + (orderId || '---'));
                } else {
                    $("#result-failed").fadeIn();
                }
            }
        } else {
            $(".result-content").hide();
            $("#result-failed").fadeIn();
        }
    })();
</script>
