<!-- Payment Result View -->
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div id="payment-success" style="display: none;">
                <div class="mb-4">
                    <i class="icon icon-circle-check text-success display-1"></i>
                </div>
                <h2 class="fw-bold font-serif mb-3">Thanh toán thành công!</h2>
                <p class="text-muted mb-5">Cảm ơn bạn đã lựa chọn Booksaw. Đơn hàng của bạn đang được xử lý và sẽ sớm được giao đến bạn.</p>
                <div class="card border-0 bg-light rounded-4 p-4 mb-5 text-start">
                    <div class="d-flex justify-content-between mb-2">
                        <span>Mã giao dịch:</span>
                        <span id="vnpay-txn" class="fw-bold">...</span>
                    </div>
                    <div class="d-flex justify-content-between">
                        <span>Số tiền:</span>
                        <strong id="vnpay-amount" class="text-accent">...</strong>
                    </div>
                </div>
                <div class="d-grid gap-3">
                    <button onclick="layout.render('Orders', 'History')" class="btn btn-dark rounded-pill py-3">Xem đơn hàng của tôi</button>
                    <button onclick="layout.render('', 'Home/Index')" class="btn btn-outline-dark border-0">Tiếp tục mua sắm</button>
                </div>
            </div>

            <div id="payment-failed" style="display: none;">
                <div class="mb-4">
                    <i class="icon icon-close text-danger display-1"></i>
                </div>
                <h2 class="fw-bold font-serif mb-3">Thanh toán thất bại</h2>
                <p class="text-muted mb-5">Đã có lỗi xảy ra trong quá trình thanh toán. Vui lòng kiểm tra lại phương thức thanh toán hoặc thử lại sau.</p>
                <div class="d-grid gap-3">
                    <button onclick="layout.render('Orders', 'Checkout')" class="btn btn-dark rounded-pill py-3">Thử lại</button>
                    <button onclick="layout.render('', 'Home/Index')" class="btn btn-outline-dark border-0">Về trang chủ</button>
                </div>
            </div>
        </div>
    </div>
</div>
