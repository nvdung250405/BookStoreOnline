<div class="admin-suppliers-page p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h3 class="fw-bold mb-1">Partners & Suppliers Management</h3>
            <p class="text-muted small mb-0">Registry of publishers and distributors for inventory fulfillment</p>
        </div>
        <button class="btn btn-accent rounded-pill px-4 shadow-sm" onclick="suppliers.addSupplier()">
            <i class="icon icon-plus me-2"></i> Add New Partner
        </button>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden bg-white">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light text-muted extra-small text-uppercase fw-bold border-0">
                    <tr>
                        <th class="ps-4 py-3">Partner Name</th>
                        <th class="py-3">Contact Info</th>
                        <th class="py-3 text-end pe-4">Operations</th>
                    </tr>
                </thead>
                <tbody id="suppliers-list">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="supplierModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4 border-0 shadow">
            <div class="modal-header border-bottom-0 pb-0">
                <h5 class="modal-title fw-bold" id="supplierModalTitle">Add New Partner</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="supplierForm">
                    <input type="hidden" id="supplierId">
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Partner Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control rounded-3" id="supplierName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">Contact Info</label>
                        <input type="text" class="form-control rounded-3" id="supplierContactInfo" placeholder="Phone, Email or Address">
                    </div>
                </form>
            </div>
            <div class="modal-footer border-top-0 pt-0">
                <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-accent rounded-pill px-4" onclick="suppliers.saveSupplier()">Save Partner</button>
            </div>
        </div>
    </div>
</div>
