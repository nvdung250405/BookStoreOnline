<!-- Booksaw Header - Compact & Modern -->
<div id="header-wrap" style="
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1030;
    backdrop-filter: blur(10px) saturate(160%);
    -webkit-backdrop-filter: blur(10px) saturate(160%);
    background: rgba(255,255,255,0.97);
    box-shadow: 0 1px 0 rgba(0,0,0,0.07);
    transition: box-shadow 0.3s ease;
">

    <!-- ===== TOP BAR (compact) ===== -->
    <div id="top-bar" class="d-none d-md-block" style="background:#2F2F2F; padding: 2px 0;">
        <div class="container-xl">
            <div class="d-flex justify-content-between align-items-center">
                <!-- Left: social -->
                <div class="d-flex gap-3">
                    <a href="#" class="text-white-50 small" style="font-size:0.75rem;"><i
                            class="icon icon-facebook"></i></a>
                    <a href="#" class="text-white-50 small" style="font-size:0.75rem;"><i
                            class="icon icon-twitter"></i></a>
                    <a href="#" class="text-white-50 small" style="font-size:0.75rem;"><i
                            class="icon icon-youtube-play"></i></a>
                </div>
                <!-- Right: user dropdown + cart -->
                <div class="d-flex align-items-center gap-4">
                    <!-- User Dropdown (renders inside #user-account-wrapper) -->
                    <div id="user-account-wrapper" class="position-relative">
                        <a href="javascript:void(0)" onclick="layout.render('Auth','Login')"
                            class="text-white-50 text-decoration-none d-flex align-items-center gap-1"
                            style="font-size:0.8rem;">
                            <i class="icon icon-user" style="font-size:0.85rem;"></i>
                            <span>Đăng nhập</span>
                        </a>
                    </div>
                    <!-- Cart -->
                    <a href="javascript:void(0)" onclick="layout.render('Orders','Cart')"
                        class="text-white-50 text-decoration-none d-flex align-items-center gap-1"
                        style="font-size:0.8rem;">
                        <i class="icon icon-clipboard" style="font-size:0.85rem;"></i>
                        <span>Giỏ hàng</span>
                        <span class="badge rounded-pill ms-1 text-white" id="cart-count"
                            style="background:#C5A992; font-size:0.7rem; padding:2px 7px;">0</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== MAIN HEADER ===== -->

        <div class="container-xl">
            <nav class="navbar navbar-expand-lg navbar-light p-0">
                <div class="container-fluid p-0">
                    <!-- Logo -->
                    <a class="navbar-brand py-0 me-5" href="javascript:void(0)" onclick="layout.render('Home','Index')">
                        <img src="assets/images/main-logo.png" alt="Booksaw" height="36"
                            onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                        <span
                            style="display:none; font-size:1.4rem; font-weight:800; color:#2F2F2F; letter-spacing:-1px;">
                            Book<span style="color:#C5A992;">saw</span>
                        </span>
                    </a>

                    <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
                        data-bs-target="#mainNavbar">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="mainNavbar">
                        <!-- Nav Links -->
                        <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-lg-3">
                            <li class="nav-item">
                                <a class="nav-link fw-bold text-uppercase"
                                    style="font-size:0.82rem; letter-spacing:0.5px;" href="javascript:void(0)"
                                    onclick="layout.render('Home','Index')">Trang chủ</a>
                            </li>
                            <li class="nav-item dropdown">
                                <a class="nav-link fw-bold text-uppercase dropdown-toggle"

                                <ul class="dropdown-menu border-0 shadow rounded-4 py-2" style="min-width:220px;">
                                    <li><a class="dropdown-item small py-2 fw-bold" href="javascript:void(0)"

                                    <li>
                                        <hr class="dropdown-divider my-1">
                                    </li>
                                    <!-- Dynamic categories loaded by loadCategoryDropdown() -->
                                    <div id="header-category-items">
                                        <li><a class="dropdown-item small py-2 text-muted" href="javascript:void(0)">
                                                <span class="spinner-border spinner-border-sm me-2"></span>Đang tải...
                                            </a></li>
                                    </div>
                                    <li>
                                        <hr class="dropdown-divider my-1">
                                    </li>
                                    <li><a class="dropdown-item small py-2 fw-bold" href="javascript:void(0)"
                                            onclick="layout.render('Categories','Index')">🏷️ Xem tất cả danh mục →</a>
                                    </li>
                                </ul>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link fw-bold text-uppercase"
                                    style="font-size:0.82rem; letter-spacing:0.5px;" href="javascript:void(0)"
                                    onclick="layout.render('Home','About')">Giới thiệu</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link fw-bold text-uppercase"
                                    style="font-size:0.82rem; letter-spacing:0.5px;" href="javascript:void(0)"
                                    onclick="layout.render('Home','Contact')">Liên
                                    hệ</a>
                            </li>
                        </ul>

                        <!-- Search + Mobile Cart -->
                        <div class="d-flex align-items-center gap-3">
                            <!-- Search toggle -->
                            <button class="btn btn-link text-dark p-1 shadow-none border-0" id="searchToggleCustomBtn" onclick="window.toggleCustomSearch(event)">
                                <i class="icon icon-search" style="font-size:1.1rem;"></i>
                            </button>
                            <!-- Mobile-only: cart + user -->
                            <a href="javascript:void(0)" onclick="layout.render('Orders','Cart')"
                                class="d-lg-none text-dark text-decoration-none position-relative">
                                <i class="icon icon-clipboard fs-5"></i>
                                <span class="badge position-absolute top-0 start-100 translate-middle rounded-pill"
                                    style="background:#C5A992; font-size:0.6rem;" id="cart-count-mobile">0</span>
                            </a>
                        </div>
                    </div>
                </div>
            </nav>

            <!-- Search Box (Custom Smooth Overlay) -->
            <div class="search-overlay-custom position-absolute w-100 start-0 z-3" id="searchBox" style="top: 100%; border-top: 1px solid rgba(0,0,0,0.03); background: linear-gradient(to bottom, #ffffff, rgba(255,255,255,0.9) 70%, rgba(255,255,255,0)); padding-bottom: 35px; padding-top: 25px;">
                <!-- Thiết kế Tối giản Hiện đại: Thanh Search Lơ lửng chính xác -->
                <div class="mx-auto position-relative px-3" style="max-width: 680px;">
                    <form id="ai-search-form" class="d-flex align-items-center bg-white rounded-pill shadow-lg border-0" autocomplete="off"
                        onsubmit="event.preventDefault(); books.searchAI($('#ai-search-input').val()); window.closeCustomSearch(); $('#ai-search-suggestions').hide();"
                        style="transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); height: 50px; padding: 5px; border: 1px solid rgba(0,0,0,0.08) !important;">
                        
                        <div class="flex-grow-1 d-flex align-items-center ps-4">
                            <i class="icon icon-search text-muted me-2" style="font-size: 1rem; opacity: 0.5;"></i>
                            <input id="ai-search-input"
                                class="border-0 bg-transparent w-100 shadow-none p-0"
                                style="font-size:0.9rem; outline: none; height: 100%; margin: 0 !important; color: #333;" 
                                type="search"
                                placeholder="Gõ cốt truyện, bài học hoặc nội dung cần tìm...">
                        </div>

                        <button class="btn rounded-pill fw-bold px-4 d-flex align-items-center justify-content-center h-100"
                            style="background:#333; color:white; font-size:0.75rem; white-space:nowrap; border: none; letter-spacing: 1.5px; min-width: 120px; transition: all 0.3s;"
                            type="submit">
                            AI SEARCH
                        </button>
                    </form>
                    
                    <!-- Dropdown gợi ý sách thông minh chính xác bên dưới -->
                    <div id="ai-search-suggestions" class="list-group position-absolute w-100 shadow-lg border-0 rounded-4 overflow-hidden" 
                         style="display:none; top: calc(100% + 10px); z-index: 1060; background: white; max-height: 400px; overflow-y: auto; left: 0; border: 1px solid rgba(0,0,0,0.05) !important;">
                    </div>
                </div>
            </div>
            <style>
                /* Loại bỏ hoàn toàn sự can thiệp của Bootstrap, tự làm Custom mượt mà 100% */
                .search-overlay-custom {
                    pointer-events: none;
                    visibility: hidden;
                }
                .search-overlay-custom.active {
                    pointer-events: auto;
                    visibility: visible;
                }
                
                /* Hiệu ứng bay ra từ icon kính lúp (góc bên phải) */
                .search-overlay-custom #ai-search-form {
                    opacity: 0;
                    transform: translateY(-20px) scale(0.85);
                    transform-origin: 85% 0; /* Điểm góc bắt cháy: bên phải thanh menu */
                    transition: opacity 0.2s ease, transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
                }
                .search-overlay-custom.active #ai-search-form {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                    transition-delay: 0.05s;
                }
                
                /* Fade siêu êm cho danh sách gợi ý */
                #ai-search-suggestions {
                    transition: opacity 0.25s ease, transform 0.25s ease;
                }
                
                #ai-search-form:focus-within {
                    transform: translateY(-2px);
                    box-shadow: 0 15px 35px rgba(0,0,0,0.15) !important;
                    border-color: rgba(0,0,0,0.15) !important;
                }
                #ai-search-form button:hover {
                    background: #b3937d !important;
                    transform: scale(1.03);
                }
                #ai-search-input::placeholder {
                    color: #adb5bd;
                    font-weight: 400;
                }
            </style>
        </div>
    </header>
</div>

<style>
    /* ── Nav links ── */
    #header .nav-link {
        color: #2F2F2F !important;
    }

    #header .nav-link:hover,
    #header .nav-link.active {
        color: #C5A992 !important;
    }

    /* ── Dropdown items ── */
    .dropdown-item:hover,
    .dropdown-item:focus {
        background: #fdf5ef;
        color: #C5A992;
    }

    /* ── User dropdown menu ── */
    #userDropdownMenu {
        min-width: 200px;
        right: 0;
        left: auto !important;
        top: calc(100% + 6px);
        border-radius: 12px !important;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12) !important;
        border: none !important;
        animation: fadeDropdown 0.15s ease-out;
    }

    @keyframes fadeDropdown {
        from {
            opacity: 0;
            transform: translateY(-6px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* ── Button resets ── */
    #userDropdownBtn {
        /* Chỉ reset những gì cần, KHÔNG override background/border vì JS sẽ set inline */
        cursor: pointer;
        line-height: 1;
        /* Không đặt background/border/color ở đây — JS layout-manager sẽ set inline khi logged in */
    }

    /* Khi CHƯA login — link bình thường, JS cũng render link không phải button */
    #user-account-wrapper a {
        transition: color 0.2s;
    }

    #user-account-wrapper a:hover {
        color: #fff !important;
    }

    /* Hover effect cho nút đã login */
    #userDropdownBtn:hover {
        background: rgba(255, 255, 255, 0.15) !important;
        border-color: rgba(255, 255, 255, 0.3) !important;
    }

    /* ── Accent badge (role label) ── */
    .badge-role {
        background: rgba(197, 169, 146, 0.15);
        color: #C5A992;
        font-size: 0.65rem;
        border-radius: 20px;
        padding: 2px 8px;
        display: inline-block;
        margin-top: 2px;
    }

    /* ── Header transparent background (let wrapper handle it) ── */
    #header {
        background: transparent !important;
        border-bottom: none !important;
        padding: 10px 0;
    }
</style>

<script>
    // Custom Logic đóng/mở Search Box bỏ qua Bootstrap thô cứng
    window.toggleCustomSearch = window.toggleCustomSearch || function(e) {
        if (e) e.preventDefault();
        const box = document.getElementById('searchBox');
        if (box) {
            if (box.classList.contains('active')) {
                window.closeCustomSearch();
            } else {
                box.classList.add('active');
                setTimeout(() => document.getElementById('ai-search-input')?.focus(), 100);
            }
        }
    };
    
    window.closeCustomSearch = window.closeCustomSearch || function() {
        const box = document.getElementById('searchBox');
        if (box && box.classList.contains('active')) {
            box.classList.remove('active');
            const input = document.getElementById('ai-search-input');
            if (input) input.blur(); // Tắt bàn phím ảo trên mobile khi ẩn
        }
    };

    (function () {
        const SCROLL_THRESHOLD = 40;  // px scroll để thu nav
        const HIDE_DELAY = 2000; // ms idle trước khi ẩn toàn bộ
        const TRIGGER_ZONE = 55;   // px từ đỉnh để hiện lại khi hover

        const wrap = document.getElementById('header-wrap');
        const topBar = document.getElementById('top-bar');
        const header = document.getElementById('header');

        let hideTimer = null;
        let isHidden = false;
        let isHovering = false;

        /* ── Khởi tạo transitions ── */
        if (wrap) wrap.style.transition = 'transform 0.35s cubic-bezier(0.4,0,0.2,1), box-shadow 0.3s ease';
        if (header) header.style.transition = 'padding 0.3s ease';

        /* ── Shrink: thu gọn navbar khi scroll ── */
        function applyScrollState() {
            const scrolled = window.scrollY > SCROLL_THRESHOLD;

            if (header) {
                header.style.padding = scrolled ? '0px 0' : '12px 0';
            }

            const logo = document.querySelector('.navbar-brand img');
            if (logo) {
                logo.style.transition = 'height 0.3s ease';
                logo.style.height = scrolled ? '24px' : '36px';
            }

            if (wrap) {
                wrap.style.boxShadow = scrolled
                    ? '0 4px 20px rgba(0,0,0,0.12)'
                    : '0 1px 0 rgba(0,0,0,0.07)';
            }
        }

        /* ── Auto-hide: ẩn/hiện toàn bộ header-wrap ── */
        function showWrap() {
            if (!wrap) return;
            isHidden = false;
            wrap.style.transform = 'translateY(0)';
        }

        function hideWrap() {
            // Không ẩn nếu đang hover hoặc đang ở đầu trang
            if (!wrap || isHovering || window.scrollY <= SCROLL_THRESHOLD) return;
            
            isHidden = true;
            wrap.style.transform = 'translateY(-100%)';
        }

        function resetHideTimer() {
            clearTimeout(hideTimer);
            if (isHidden) showWrap();
            // Đặt lại timer, nhưng hideWrap sẽ tự huỷ nếu đang ở đầu trang
            hideTimer = setTimeout(hideWrap, HIDE_DELAY);
        }

        /* ── Event: scroll ── */
        window.addEventListener('scroll', function () {
            applyScrollState();
            resetHideTimer();
            
            // Tự động đóng mượt mà khung AI Search (và gợi ý) khi lướt trang
            const searchBox = document.getElementById('searchBox');
            const suggestBox = document.getElementById('ai-search-suggestions');
            if (searchBox && searchBox.classList.contains('active')) {
                window.closeCustomSearch();
            }
            if (suggestBox && suggestBox.style.display !== 'none') {
                suggestBox.style.opacity = '0';
                setTimeout(() => suggestBox.style.display = 'none', 250);
            }
        }, { passive: true });

        /* ── Event: mouse move ── */
        document.addEventListener('mousemove', function (e) {
            if (!wrap) return;

            const inTrigger = e.clientY < TRIGGER_ZONE;
            const inWrap = wrap.contains(e.target);

            if (inTrigger || inWrap) {
                if (!isHovering) {
                    isHovering = true;
                    clearTimeout(hideTimer);
                    showWrap();
                }
            } else {
                if (isHovering) {
                    isHovering = false;
                    resetHideTimer();
                }
            }
        });

        /* ── Thông minh hơn: Auto-hide Search Box và UI Logic ── */
        document.addEventListener('click', function(e) {
            const searchBox = document.getElementById('searchBox');
            const toggleBtn = document.getElementById('searchToggleCustomBtn');
            
            // Ẩn searchBox siêu mượt nếu click ra ngoài
            if (searchBox && searchBox.classList.contains('active')) {
                if (!searchBox.contains(e.target) && (!toggleBtn || !toggleBtn.contains(e.target))) {
                    window.closeCustomSearch();
                }
            }
        });

        /* ── Tính năng Live AI Search (Gợi ý trực tiếp) ── */
        const searchInput = document.getElementById('ai-search-input');
        const suggestBox = document.getElementById('ai-search-suggestions');
        let searchDebounceTimer;
        let currentSearchId = 0; // Biến đánh dấu token truy vấn hiện tại để chống lỗi đè dữ liệu (race conditions)

        if (searchInput && suggestBox) {
            searchInput.addEventListener('input', function() {
                clearTimeout(searchDebounceTimer);
                const query = this.value.trim();
                const searchId = ++currentSearchId; // Khóa truy vấn
                
                if (!query) {
                    suggestBox.style.display = 'none';
                    return;
                }
                
                suggestBox.style.display = 'block';
                suggestBox.innerHTML = '<div class="p-3 text-center text-muted small"><span class="spinner-border spinner-border-sm me-2 text-accent"></span>AI đang suy nghĩ...</div>';

                searchDebounceTimer = setTimeout(async () => {
                    // Nếu trong lúc chờ nửa giây mà có gõ thêm chữ -> Hủy lệnh này
                    if (searchId !== currentSearchId) return; 

                    try {
                        const res = await api.post('/books/ai-search', { query });
                        
                        // Nếu trong lúc chờ mạng API gọi về mà có gõ nhánh khác -> Bỏ kết quả cũ đi
                        if (searchId !== currentSearchId) return; 

                        const results = res.data || [];
                        
                        // Bật lên lại chắc chắn vì lỡ lúc chờ người dùng có cuộn chuột làm ẩn mất
                        if (document.activeElement === searchInput || searchInput.value.trim() === query) {
                            suggestBox.style.display = 'block';
                        }
                        
                        if (results.length === 0) {
                            suggestBox.innerHTML = '<div class="p-3 text-center text-muted fw-bold" style="font-size: 0.85rem;">Không tìm thấy sách phù hợp.</div>';
                            return;
                        }

                        // Render top 5 gợi ý
                        const html = results.slice(0, 5).map(b => `
                            <a href="javascript:void(0)" onclick="layout.render('Books','Details','${b.isbn}'); window.closeCustomSearch();" 
                               class="list-group-item list-group-item-action d-flex align-items-center gap-3 py-2 border-0 border-bottom text-decoration-none">
                                <img src="${b.coverImage ? 'assets/images/'+b.coverImage : 'assets/images/product-item1.jpg'}" 
                                     style="width:35px; height:50px; object-fit:contain; border-radius:4px; flex-shrink:0;">
                                <div class="overflow-hidden">
                                    <h6 class="mb-0 fw-bold text-truncate text-dark" style="font-size:0.85rem;">${b.title}</h6>
                                    <span class="text-accent fw-bold" style="font-size:0.8rem;">${api.formatCurrency(b.price)}</span>
                                </div>
                            </a>
                        `).join('');
                        
                        // Khôi phục mượt mà danh sách
                        suggestBox.style.opacity = '1';
                        suggestBox.innerHTML = html + `<a href="javascript:void(0)" onclick="$('#ai-search-form').submit()" class="list-group-item list-group-item-action text-center small text-primary fw-bold py-2 bg-light text-decoration-none">Xem thêm chi tiết (${results.length} kết quả) →</a>`;
                    } catch (e) {
                        if (searchId === currentSearchId) {
                            suggestBox.style.display = 'block';
                            suggestBox.innerHTML = '<div class="p-3 text-center text-danger small">Lỗi kết nối bộ não AI. Vui lòng thử lại.</div>';
                        }
                    }
                }, 500); // Đợi 0.5s sau khi gõ xong
            });
            
            // Ẩn gợi ý khi click ra ngoài input/box
            document.addEventListener('click', (e) => {
                if (!searchInput.contains(e.target) && !suggestBox.contains(e.target)) {
                    suggestBox.style.display = 'none';
                }
            });
            
            // Mở lại gợi ý nếu nhấn vào input đang có chữ
            searchInput.addEventListener('focus', () => {
                if (searchInput.value.trim() && suggestBox.innerHTML.trim() !== '') {
                    suggestBox.style.display = 'block';
                }
            });
        }

        /* ── Khởi chạy toàn cục ── */
        applyScrollState();
        hideTimer = setTimeout(hideWrap, HIDE_DELAY);
    })();
</script>
