<!-- Booksaw AI Chat Widget - Premium Google Gemini Style -->
<div id="bsw-chat" style="
    width: 350px;
    height: 520px;
    display: flex;
    flex-direction: column;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 0 0 1px rgba(255,255,255,0.4) inset;
    font-family: 'Inter', system-ui, sans-serif;
    background: rgba(255, 255, 255, 0.82);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.3);
">
    <!-- Header: Translucent & Elegant -->
    <div style="
        background: rgba(255, 255, 255, 0.4);
        padding: 16px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid rgba(0,0,0,0.05);
        flex-shrink: 0;
        z-index: 10;
    ">
        <div style="display:flex; align-items:center; gap:12px;">
            <div style="
                width: 40px; height: 40px;
                background: linear-gradient(135deg, #1A73E8, #9B72CB, #D96570);
                border-radius: 50%;
                display: flex; align-items: center; justify-content: center;
                font-size: 1.1rem;
                box-shadow: 0 4px 12px rgba(155, 114, 203, 0.3);
                border: 2px solid rgba(255,255,255,0.8);
            " id="chat-avatar-icon">✨</div>
            <div>
                <div id="chat-title" style="color:#050505; font-weight:700; font-size:1rem; line-height:1.2; letter-spacing: -0.3px;">Booksaw Spark AI</div>
                <div style="display:flex; align-items:center; gap:6px; margin-top:2px;">
                    <span id="chat-status-dot" style="width:7px; height:7px; background:#1A73E8; border-radius:50%; display:inline-block; box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.15);"></span>
                    <span id="chat-status-text" style="color:#5f6368; font-size:0.7rem; font-weight: 600;">Thông minh · Tức thì</span>
                </div>
            </div>
        </div>
        <button onclick="$('#chat-box-holder').fadeOut(300)" style="
            background: rgba(0,0,0,0.04);
            border: none; border-radius: 50%;
            width: 32px; height: 32px;
            color: #3c4043;
            font-size: 1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        " onmouseover="this.style.background='rgba(0,0,0,0.08)'; this.style.transform='rotate(90deg)';"
           onmouseout="this.style.background='rgba(0,0,0,0.04)'; this.style.transform='rotate(0deg)';">✕</button>
    </div>

    <!-- Messages Area: Smooth Scroll & Visual Flow -->
    <div id="chat-box" style="
        flex: 1;
        overflow-y: auto;
        padding: 20px 18px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        background: transparent;
        scroll-behavior: smooth;
    ">
        <!-- AI Greeting -->
        <div class="bsw-msg-ai">
            <div class="bsw-avatar">✨</div>
            <div class="bsw-bubble" style="background: rgba(255,255,255,0.7); box-shadow: 0 4px 15px rgba(0,0,0,0.03);">
                Chào bạn! Tôi là <strong>Booksaw Spark AI</strong>. ✨<br><br>
                Hôm nay bạn cần tôi giúp tìm kiếm cuốn sách nào hay hỗ trợ vấn đề gì không?
            </div>
        </div>
    </div>

    <!-- Input Area: Floating Style -->
    <div style="
        padding: 5px 16px 20px 16px;
        background: transparent;
        flex-shrink: 0;
    ">
        <div style="
            background: rgba(255,255,255,0.9);
            border-radius: 28px;
            padding: 6px 6px 6px 18px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(0,0,0,0.06);
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        " id="chat-input-wrapper">
            <input type="text" id="chat-user-msg" placeholder="Hỏi Booksaw Spark AI..." style="
                flex: 1;
                border: none;
                background: transparent;
                font-size: 0.95rem;
                outline: none;
                font-family: inherit;
                color: #202124;
                padding: 8px 0;
                font-weight: 500;
            " onfocus="document.getElementById('chat-input-wrapper').style.borderColor='#1A73E8'; document.getElementById('chat-input-wrapper').style.boxShadow='0 12px 30px rgba(26, 115, 232, 0.12)';"
               onblur="document.getElementById('chat-input-wrapper').style.borderColor='rgba(0,0,0,0.06)'; document.getElementById('chat-input-wrapper').style.boxShadow='0 8px 24px rgba(0,0,0,0.06)';"
               onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();support.sendChatFromInput();}">
            
            <button onclick="support.sendChatFromInput()" style="
                width: 40px; height: 40px;
                background: #1A73E8;
                border: none; border-radius: 50%;
                color: #fff; font-size: 1.1rem;
                cursor: pointer;
                display: flex; align-items: center; justify-content: center;
                flex-shrink: 0;
                margin-left: 10px;
                transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
                box-shadow: 0 4px 10px rgba(26, 115, 232, 0.3);
            " onmouseover="this.style.background='#1557b0'; this.style.transform='scale(1.1)';"
               onmouseout="this.style.background='#1A73E8'; this.style.transform='scale(1)';">
               ↑
            </button>
        </div>
        <div style="text-align: center; margin-top: 8px;">
            <span style="font-size: 0.65rem; color: #70757a; font-weight: 500; opacity: 0.8;">Booksaw AI có thể đưa ra kết quả thiếu chính xác.</span>
        </div>
    </div>
</div>

<style>
/* Smooth Entry Animations */
@keyframes bsw-fade-in {
    0% { opacity: 0; transform: translateY(15px) scale(0.95); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
}

#chat-box::-webkit-scrollbar { width: 5px; }
#chat-box::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.08); border-radius: 10px; }
#chat-box::-webkit-scrollbar-track { background: transparent; }
#chat-box:hover::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); }

.bsw-msg-ai { display: flex; gap: 12px; align-items: flex-start; }
.bsw-msg-user { display: flex; justify-content: flex-end; margin-left: 40px; }

.bsw-avatar {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #1A73E8, #9B72CB, #D96570);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem;
    flex-shrink: 0;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    color: #fff;
}

.bsw-msg-ai .bsw-bubble {
    background: #ffffff;
    border-radius: 4px 20px 20px 20px;
    padding: 12px 18px;
    max-width: 85%;
    font-size: 0.9rem;
    line-height: 1.6;
    color: #1f1f1f;
    box-shadow: 0 6px 18px rgba(0,0,0,0.03);
    border: 1px solid rgba(0,0,0,0.02);
}

.bsw-msg-user .bsw-bubble {
    background: #1A73E8;
    color: #ffffff;
    border-radius: 20px 20px 4px 20px;
    padding: 11px 18px;
    max-width: 100%;
    font-size: 0.9rem;
    line-height: 1.5;
    box-shadow: 0 8px 20px rgba(26, 115, 232, 0.15);
}

/* AI Typing Wave */
@keyframes bsw-typing-wave {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-3px); opacity: 1; }
}
.bsw-typing-dot {
    width: 6px; height: 6px;
    background: #1A73E8;
    border-radius: 50%;
    animation: bsw-typing-wave 1.4s infinite ease-in-out;
}
</style>
