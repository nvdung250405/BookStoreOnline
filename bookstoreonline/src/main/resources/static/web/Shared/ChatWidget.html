<!-- Support Chat Widget (loaded dynamically by support.toggleChat) -->
<div class="chat-container bg-white shadow-lg rounded-4 overflow-hidden border" style="max-width: 360px; height: 480px; display: flex; flex-direction: column;">
    <div class="chat-header p-3 d-flex justify-content-between align-items-center"
         style="background: linear-gradient(135deg, #2c2c2c, #1a1a1a);">
        <div class="d-flex align-items-center gap-2">
            <div class="rounded-circle bg-accent d-flex align-items-center justify-content-center"
                 style="width:36px; height:36px; flex-shrink:0;">
                <i class="icon icon-paper-plane text-white" style="font-size:0.9rem;"></i>
            </div>
            <div>
                <h6 class="mb-0 fw-bold text-white" style="font-size:0.85rem;">Hỗ trợ trực tuyến</h6>
                <span style="font-size:0.68rem; color:rgba(255,255,255,0.5);">
                    <span class="me-1" style="color:#4ade80;">●</span>Thường phản hồi trong vài phút
                </span>
            </div>
        </div>
        <button class="btn p-0 border-0 text-white-50" onclick="$('#chat-box-holder').fadeOut()" style="font-size:1.1rem; line-height:1;">
            <i class="icon icon-close"></i>
        </button>
    </div>

    <div class="chat-messages flex-grow-1 p-3 overflow-auto bg-light d-flex flex-column gap-2" id="chat-box">
        <div class="message-ai bg-white p-3 rounded-4 shadow-sm align-self-start" style="max-width: 85%; font-size:0.85rem;">
            👋 Chào bạn! Tôi là trợ lý AI của <strong>Booksaw</strong>.<br>Tôi có thể giúp gì cho bạn hôm nay?
        </div>
    </div>

    <div class="chat-input p-2 border-top bg-white">
        <form id="chat-form" class="input-group">
            <input type="text" id="chat-user-msg"
                   class="form-control border-0 bg-light rounded-start-pill shadow-none"
                   style="font-size:0.85rem;"
                   placeholder="Nhập tin nhắn..." required>
            <button class="btn btn-accent rounded-end-pill px-3" type="submit">
                <i class="icon icon-paper-plane text-white"></i>
            </button>
        </form>
    </div>
</div>

<style>
    #chat-box::-webkit-scrollbar { width: 4px; }
    #chat-box::-webkit-scrollbar-thumb { background: #C5A992; border-radius: 10px; }
    .message-ai { font-size: 0.85rem; line-height: 1.5; }
    .message-user { font-size: 0.85rem; line-height: 1.5; }
</style>
