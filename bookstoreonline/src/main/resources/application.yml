server:
  port: 8080

spring:
  application:
    name: bookstoreonline

  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=nha_sach_online;encrypt=true;trustServerCertificate=true;
    username: sa
    password: 123
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.SQLServerDialect
    open-in-view: false

jwt:
  secret: 7A25432A462D4A614E645267556B58703272357538782F413F4428472B4B6250   # 256-bit key (HEX)
  expiration: 86400000   # 24 giờ (ms)

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.bookstore: DEBUG
    org.hibernate.SQL: DEBUG
